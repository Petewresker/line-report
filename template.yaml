  IncidentTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub IncidentReports-${AWS::StackName}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: AgencyID #  GSI1
          AttributeType: S
        - AttributeName: UserID #  GSI2
          AttributeType: S
        - AttributeName: CreatedAt #  GSI3
          AttributeType: S
        - AttributeName: ReporterID #  GSI3
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        # GSI 1: Agency_Portal
        - IndexName: GSI_1_Agency_Portal
          KeySchema:
            - AttributeName: AgencyID
              KeyType: HASH
            - AttributeName: PK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

        # GSI 2: User_Portal
        - IndexName: GSI_2_User_Portal
          KeySchema:
            - AttributeName: UserID
              KeyType: HASH
            - AttributeName: AgencyID
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

        # GSI 3: User History
        - IndexName: GSI_3_User_History
          KeySchema:
            - AttributeName: ReporterID
              KeyType: HASH
            - AttributeName: CreatedAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

